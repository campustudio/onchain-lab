    <text x="20" y="34" fill="#6b7688" font-size="13" letter-spacing="1">MEMPOOL</text>
    <rect x="20" y="48" width="14" height="14" rx="3" fill="rgba(255,180,84,0.2)" stroke="#ffb454"/>
    <rect x="40" y="48" width="14" height="14" rx="3" fill="rgba(255,180,84,0.2)" stroke="#ffb454"/>
